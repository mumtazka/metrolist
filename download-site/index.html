<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download Metrolist, the seamless music playback app for all your devices.">
    <title>Metrolist Download</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="background-glows">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>
    
    <div class="container">
        <header class="hero">
            <div class="logo-container">
                <i class="ri-music-2-fill logo-icon"></i>
            </div>
            <h1 class="title">Metrolist</h1>
            <p class="subtitle">Experience music like never before. Seamless playback across all your devices.</p>
        </header>

        <main class="download-section">
            <div class="glass-card main-download" id="primary-download-card">
                <p class="os-detected">Detected OS: <span id="os-name">Loading...</span></p>
                <div id="primary-download-btn-container" class="primary-btn-wrapper">
                    <button class="btn btn-primary" id="primary-download-btn">
                        <i class="ri-download-line"></i> Download App
                    </button>
                    <p class="version-info">Version 1.0.0 • Free</p>
                </div>
            </div>

            <h3 class="other-platforms-title">Other Platforms</h3>
            <div class="grid-cards" id="other-platforms-container">
                <!-- Javascript will render other platforms here -->
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Metrolist. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
