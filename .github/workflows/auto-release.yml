name: Auto Build & Release

# Triggers on every push to main, or manually via the Actions tab
on:
  push:
    branches: [main]
    paths-ignore:
      - 'download-site/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Build Android APK (on Ubuntu) ───
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Build APK (Foss Release)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleFossRelease --no-configuration-cache --warning-mode summary

      - name: Find and Rename APK
        run: |
          mkdir -p release-output
          APK=$(find app/build/outputs/apk/foss/release -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" release-output/Metrolist-Android.apk
          else
            echo "ERROR: No APK file found!"
            find app/build/outputs/ -type f || true
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-output/Metrolist-Android.apk
          if-no-files-found: error

  # ─── Build Linux .deb (on Ubuntu) ───
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install system dependencies (protobuf + deb tools)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler fakeroot dpkg

      - name: Generate protobuf files
        run: |
          cd app
          bash generate_proto.sh

      - name: Build Linux DEB
        run: |
          chmod +x gradlew
          ./gradlew :desktop:packageDeb --no-configuration-cache --warning-mode summary

      - name: Find and Rename DEB
        run: |
          mkdir -p release-output
          DEB=$(find desktop/build/compose/binaries -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" release-output/Metrolist-Linux.deb
          else
            echo "ERROR: No DEB file found!"
            find desktop/build/ -type f -name "*.deb" 2>/dev/null || true
            exit 1
          fi

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release-output/Metrolist-Linux.deb
          if-no-files-found: error

  # ─── Build Windows .exe (on Windows) ───
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Protobuf (Windows)
        run: choco install protoc --yes

      - name: Generate protobuf files (Windows)
        shell: bash
        run: |
          cd app
          bash generate_proto.sh

      - name: Build Windows EXE
        run: ./gradlew :desktop:packageExe --no-configuration-cache --warning-mode summary

      - name: Find and Rename EXE
        shell: bash
        run: |
          mkdir -p release-output
          EXE=$(find desktop/build/compose/binaries -name "*.exe" | head -1)
          if [ -n "$EXE" ]; then
            cp "$EXE" release-output/Metrolist-Windows.exe
          else
            echo "ERROR: No EXE file found!"
            find desktop/build/ -type f 2>/dev/null | head -20 || true
            exit 1
          fi

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release-output/Metrolist-Windows.exe
          if-no-files-found: error

  # ─── Combine all artifacts into a single GitHub Release ───
  create-release:
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Organize release files
        run: |
          mkdir -p release-files
          find all-artifacts -type f \( -name "*.apk" -o -name "*.deb" -o -name "*.exe" \) -exec cp {} release-files/ \;
          echo "Files ready for release:"
          ls -lh release-files/
          FILE_COUNT=$(ls release-files/ | wc -l)
          if [ "$FILE_COUNT" -lt 3 ]; then
            echo "WARNING: Expected 3 files but found $FILE_COUNT"
          fi

      - name: Delete existing release with same tag (if any)
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" --yes || true
          git push --delete origin "v${{ steps.version.outputs.version }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Metrolist v${{ steps.version.outputs.version }}" \
            --notes "Automated release of Metrolist v${{ steps.version.outputs.version }}.

          ## Downloads
          - **Android**: Metrolist-Android.apk
          - **Linux**: Metrolist-Linux.deb (install with \`sudo dpkg -i Metrolist-Linux.deb\`)
          - **Windows**: Metrolist-Windows.exe (run the installer)" \
            --latest \
            release-files/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
